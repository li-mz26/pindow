<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perler Beads Mini</title>
  <style>
    :root {
      --bg: #f7e7c8;
      --panel: #e9c2bb;
      --panel-top: #dcb4ad;
      --accent: #ff7f50;
      --text: #3f2f2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(#f5d5cf, #f0cbc5);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      user-select: none;
    }

    .app {
      width: min(92vw, 760px);
      height: min(92vh, 980px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      background: #fff;
      display: grid;
      grid-template-rows: 1fr 126px;
    }

    .board-wrap {
      position: relative;
      background: var(--bg);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .pill {
      pointer-events: auto;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.88);
      color: #4a352f;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    .tray {
      background: linear-gradient(var(--panel), var(--panel-top));
      border-top: 4px solid #b7b1cc;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 12px;
      overflow-x: auto;
    }

    .color-bin {
      min-width: 92px;
      height: 92px;
      border-radius: 16px;
      border: 3px solid #f47f58;
      background: #de5e34;
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.09);
      position: relative;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.1s ease;
    }

    .color-bin:hover { transform: translateY(-2px); }

    .color-bin.active {
      outline: 4px solid #fff;
      box-shadow: 0 0 0 3px #f47f58, inset 0 -8px 0 rgba(0, 0, 0, 0.09);
    }

    .bead-sample {
      width: 62px;
      height: 62px;
      border-radius: 12px;
      position: relative;
      background:
        radial-gradient(circle at 10px 10px, rgba(255, 255, 255, 0.2) 0 2px, transparent 3px),
        radial-gradient(circle at 28px 18px, rgba(255, 255, 255, 0.2) 0 2px, transparent 3px),
        radial-gradient(circle at 48px 36px, rgba(255, 255, 255, 0.2) 0 2px, transparent 3px),
        radial-gradient(circle at center, rgba(0, 0, 0, 0.14), rgba(0, 0, 0, 0.28));
      background-color: var(--c);
    }

    .help {
      position: absolute;
      right: 16px;
      bottom: 138px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board-wrap">
      <canvas id="board" aria-label="perler board"></canvas>
      <div class="hud">
        <button class="pill" id="clearBtn">清空</button>
        <button class="pill" id="catBtn">放一个猫咪模板</button>
      </div>
      <div class="help">左键放珠子 / 拖动连续放置；右键或橡皮擦删除</div>
    </section>
    <section class="tray" id="tray"></section>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const tray = document.getElementById('tray');
    const clearBtn = document.getElementById('clearBtn');
    const catBtn = document.getElementById('catBtn');

    const COLS = 22;
    const ROWS = 34;
    const palette = [
      { name: '深棕', value: '#4B2208' },
      { name: '橙红', value: '#E84B0F' },
      { name: '绿色', value: '#0B8E3E' },
      { name: '浅绿', value: '#2EA643' },
      { name: '黄橙', value: '#F29A2E' },
      { name: '米白', value: '#F7E5C0' },
      { name: '蓝灰', value: '#AAB2D0' },
      { name: '橡皮擦', value: null }
    ];

    let selected = palette[1].value;
    let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    let dragging = false;

    function resize() {
      const ratio = window.devicePixelRatio || 1;
      const { width, height } = canvas.getBoundingClientRect();
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      draw();
    }

    function cellSize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      return Math.min((w - 24) / COLS, (h - 24) / ROWS);
    }

    function origin() {
      const s = cellSize();
      const boardW = s * COLS;
      const boardH = s * ROWS;
      return {
        x: (canvas.clientWidth - boardW) / 2,
        y: (canvas.clientHeight - boardH) / 2,
        s
      };
    }

    function drawBackground() {
      ctx.fillStyle = '#f6e7c7';
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      const { x, y, s } = origin();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cx = x + c * s + s / 2;
          const cy = y + r * s + s / 2;
          ctx.fillStyle = '#efba9e';
          ctx.beginPath();
          ctx.arc(cx, cy, s * 0.16, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawBead(cx, cy, radius, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.arc(cx, cy + radius * 0.08, radius * 0.94, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx, cy - radius * 0.08, radius * 0.9, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.32, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      drawBackground();
      const { x, y, s } = origin();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const color = grid[r][c];
          if (!color) continue;
          const cx = x + c * s + s / 2;
          const cy = y + r * s + s / 2;
          drawBead(cx, cy, s * 0.42, color);
        }
      }
    }

    function toCell(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const { x, y, s } = origin();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      const c = Math.floor((localX - x) / s);
      const r = Math.floor((localY - y) / s);
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
      return { r, c };
    }

    function paintAt(clientX, clientY, erase = false) {
      const cell = toCell(clientX, clientY);
      if (!cell) return;
      grid[cell.r][cell.c] = erase || selected === null ? null : selected;
      draw();
    }

    function mountPalette() {
      tray.innerHTML = '';
      palette.forEach((p) => {
        const btn = document.createElement('button');
        btn.className = 'color-bin';
        btn.title = p.name;
        btn.setAttribute('aria-label', p.name);
        if (p.value === selected) btn.classList.add('active');
        btn.innerHTML = `<div class="bead-sample" style="--c:${p.value || '#999'}"></div>`;
        btn.addEventListener('click', () => {
          selected = p.value;
          mountPalette();
        });
        tray.appendChild(btn);
      });
    }

    function loadCatPattern() {
      const pattern = [
        '.................11111',
        '..................1....',
        '......1...........1....',
        '.....11.1..............',
        '....111111111.....1....',
        '....11.1...............',
        '....11..................',
        '....11..1......11....11',
        '....11.....1...11....11',
        '....111..1....111....11',
        '....111...1..1111....11',
        '....1111111111111111111',
        '....1111111111111111111',
        '....1111111111111111111',
        '....2111111111111111111',
        '.....211111111111111111',
        '......21111111111111111',
        '.......2222222222111111'
      ];
      grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      pattern.forEach((row, r) => {
        [...row].forEach((ch, c) => {
          if (r >= ROWS || c >= COLS) return;
          if (ch === '1') grid[r + 3][c] = '#E84B0F';
          if (ch === '2') grid[r + 3][c] = '#4B2208';
        });
      });
      draw();
    }

    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      paintAt(e.clientX, e.clientY, e.button === 2);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      paintAt(e.clientX, e.clientY, e.buttons === 2);
    });

    window.addEventListener('pointerup', () => { dragging = false; });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    clearBtn.addEventListener('click', () => {
      grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      draw();
    });

    catBtn.addEventListener('click', loadCatPattern);

    mountPalette();
    resize();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>

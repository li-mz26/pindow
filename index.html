<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perler Beads Iso</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="board-wrap">
      <canvas id="board"></canvas>
      <div class="hud">
        <div class="group">
          <button class="pill" id="clearBtn">清空</button>
          <button class="pill" id="catBtn">加载目标图案</button>
          <button class="pill" id="rotLBtn">↺ 左转一点</button>
          <button class="pill" id="rotRBtn">↻ 右转一点</button>
        </div>
        <div class="group">
          <button class="pill" id="modeBtn">模式：色号</button>
        </div>
      </div>
      <div class="help">左键放置，拖动连续放；右键/橡皮擦删除；滚轮缩放画板；已放珠子不会被覆盖。</div>
    </section>

    <section class="target-legend hidden" id="targetLegend"></section>

    <section class="tools">
      <label class="tool-item">画板宽<input type="number" id="boardCols" min="8" max="120" value="22" /></label>
      <label class="tool-item">画板高<input type="number" id="boardRows" min="8" max="120" value="34" /></label>
      <button class="pill" id="resizeBoardBtn">应用画板尺寸</button>

      <label class="tool-item">
        源图片
        <input type="file" id="imageInput" accept="image/*" />
      </label>
      <label class="tool-item">
        导入模板
        <input type="file" id="templateInput" accept="image/png" />
      </label>
      <label class="tool-item">
        聚类色数(K)
        <input type="number" id="kInput" min="2" max="12" value="6" />
      </label>
      <button class="pill" id="convertBtn">KMeans 转拼豆模板</button>
      <button class="pill" id="fitBtn">清空并套用模板</button>
      <button class="pill" id="exportTemplateBtn">导出目标模板</button>
      <div class="progress-wrap" id="progressWrap">
        <span id="progressText">KMeans 进度：0%</span>
        <progress id="kmeansProgress" max="100" value="0"></progress>
      </div>
    </section>

    <section class="crop-modal hidden" id="cropModal">
      <div class="crop-panel">
        <h3>调整图片在画板上的位置</h3>
        <p>保持原图比例。滚轮缩放，拖动移动，确认后开始转换。</p>
        <canvas id="cropCanvas" width="800" height="500"></canvas>
        <div class="crop-actions">
          <button class="pill" id="cropCancelBtn">取消</button>
          <button class="pill" id="cropConfirmBtn">确认转换</button>
        </div>
      </div>
    </section>

    <section class="tray" id="tray"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perler Beads Iso</title>
  <style>
    :root {
      --bg: #efe4c6;
      --panel: #e9c2bb;
      --panel-top: #dcb4ad;
      --text: #3f2f2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at center, #f0e6cc, #e9ddbc);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      user-select: none;
    }
    .app {
      width: min(95vw, 1100px);
      height: min(94vh, 920px);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(104, 87, 53, 0.24);
      display: grid;
      grid-template-rows: 1fr 120px;
      background: #f8f1dc;
    }
    .board-wrap { position: relative; }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: none;
      touch-action: none;
    }
    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      gap: 8px;
    }
    .group { display: flex; gap: 8px; pointer-events: auto; }
    .pill {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      background: rgba(255,255,255,0.92);
      color: #44362c;
      box-shadow: 0 3px 14px rgba(0,0,0,0.14);
      cursor: pointer;
    }
    .tray {
      background: linear-gradient(var(--panel), var(--panel-top));
      border-top: 4px solid #b7b1cc;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      overflow-x: auto;
    }
    .color-bin {
      min-width: 86px;
      height: 86px;
      border-radius: 16px;
      border: 3px solid #f47f58;
      background: #de5e34;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.09);
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .color-bin.active {
      outline: 4px solid #fff;
      box-shadow: 0 0 0 3px #f47f58, inset 0 -8px 0 rgba(0,0,0,0.09);
    }
    .bead-sample {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: radial-gradient(circle at center, rgba(0,0,0,.2), rgba(0,0,0,.35));
      background-color: var(--c);
    }
    .help {
      position: absolute;
      right: 14px;
      bottom: 128px;
      background: rgba(255,255,255,.9);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board-wrap">
      <canvas id="board"></canvas>
      <div class="hud">
        <div class="group">
          <button class="pill" id="clearBtn">清空</button>
          <button class="pill" id="catBtn">加载目标图案</button>
          <button class="pill" id="rotLBtn">↺ 左旋转</button>
          <button class="pill" id="rotRBtn">↻ 右旋转</button>
        </div>
        <div class="group">
          <button class="pill" id="modeBtn">模式：色号</button>
        </div>
      </div>
      <div class="help">等距视角：左键放置，拖动连续放；右键/橡皮擦删除；已放珠子不会被覆盖。</div>
    </section>
    <section class="tray" id="tray"></section>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const tray = document.getElementById('tray');

    const COLS = 22;
    const ROWS = 34;
    const boardThickness = 26;

    const palette = [
      { name: '深棕 BR', code: 'BR', value: '#4B2208' },
      { name: '橙红 OR', code: 'OR', value: '#E84B0F' },
      { name: '绿色 GN', code: 'GN', value: '#0B8E3E' },
      { name: '浅绿 LG', code: 'LG', value: '#2EA643' },
      { name: '黄橙 YL', code: 'YL', value: '#F29A2E' },
      { name: '米白 IV', code: 'IV', value: '#F5F1E9' },
      { name: '蓝灰 BL', code: 'BL', value: '#AAB2D0' },
      { name: '橡皮擦', code: 'ER', value: null }
    ];
    const colorToCode = Object.fromEntries(palette.filter((p) => p.value).map((p) => [p.value, p.code]));

    let selected = '#F5F1E9';
    let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    let targetGrid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    let displayMode = 'code';
    let dragging = false;
    let pointer = { x: 0, y: 0, inside: false };
    let yawIndex = 0; // 0,1,2,3 => 0/90/180/270

    function yawRad() { return yawIndex * Math.PI / 2; }
    function basis() {
      const t = yawRad();
      const ct = Math.cos(t), st = Math.sin(t);
      return { ct, st };
    }
    function unit() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      return Math.min(w / (COLS + ROWS + 8), h / ((COLS + ROWS) * 0.62 + 12));
    }
    function projectRaw(u, v) {
      const { ct, st } = basis();
      const xr = u * ct - v * st;
      const yr = u * st + v * ct;
      const s = unit();
      return { x: (xr - yr) * s, y: (xr + yr) * s * 0.55 };
    }
    function boardCenterOffset() {
      const corners = [
        projectRaw(0, 0),
        projectRaw(COLS, 0),
        projectRaw(COLS, ROWS),
        projectRaw(0, ROWS)
      ];
      const minX = Math.min(...corners.map((p) => p.x));
      const maxX = Math.max(...corners.map((p) => p.x));
      const minY = Math.min(...corners.map((p) => p.y));
      const maxY = Math.max(...corners.map((p) => p.y));
      const boardMidX = (minX + maxX) / 2;
      const boardMidY = (minY + maxY) / 2;
      return {
        x: canvas.clientWidth / 2 - boardMidX,
        y: canvas.clientHeight / 2 - boardMidY
      };
    }
    function project(u, v) {
      const p = projectRaw(u, v);
      const c = boardCenterOffset();
      return { x: p.x + c.x, y: p.y + c.y };
    }
    function unproject(px, py) {
      const c = boardCenterOffset();
      const s = unit();
      const A = (px - c.x) / s;
      const B = (py - c.y) / (s * 0.55);
      const xr = (A + B) / 2;
      const yr = (B - A) / 2;
      const { ct, st } = basis();
      const u = xr * ct + yr * st;
      const v = -xr * st + yr * ct;
      return { u, v };
    }
    function toCell(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const { u, v } = unproject(clientX - rect.left, clientY - rect.top);
      const c = Math.floor(u);
      const r = Math.floor(v);
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
      return { r, c };
    }

    function drawDiamond(cx, cy, rx, ry) {
      ctx.beginPath();
      ctx.moveTo(cx, cy - ry);
      ctx.lineTo(cx + rx, cy);
      ctx.lineTo(cx, cy + ry);
      ctx.lineTo(cx - rx, cy);
      ctx.closePath();
    }

    function drawBoardBase() {
      const p00 = project(0, 0);
      const p10 = project(COLS, 0);
      const p11 = project(COLS, ROWS);
      const p01 = project(0, ROWS);

      ctx.fillStyle = '#e4c894';
      ctx.beginPath();
      ctx.moveTo(p00.x, p00.y + boardThickness);
      ctx.lineTo(p10.x, p10.y + boardThickness);
      ctx.lineTo(p11.x, p11.y + boardThickness);
      ctx.lineTo(p01.x, p01.y + boardThickness);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#d6b980';
      ctx.beginPath();
      ctx.moveTo(p10.x, p10.y);
      ctx.lineTo(p11.x, p11.y);
      ctx.lineTo(p11.x, p11.y + boardThickness);
      ctx.lineTo(p10.x, p10.y + boardThickness);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ccb174';
      ctx.beginPath();
      ctx.moveTo(p01.x, p01.y);
      ctx.lineTo(p11.x, p11.y);
      ctx.lineTo(p11.x, p11.y + boardThickness);
      ctx.lineTo(p01.x, p01.y + boardThickness);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#f6e9ca';
      ctx.beginPath();
      ctx.moveTo(p00.x, p00.y);
      ctx.lineTo(p10.x, p10.y);
      ctx.lineTo(p11.x, p11.y);
      ctx.lineTo(p01.x, p01.y);
      ctx.closePath();
      ctx.fill();
    }

    function drawTargetGrid() {
      const s = unit();
      const rx = s;
      const ry = s * 0.55;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const centerP = project(c + 0.5, r + 0.5);
          const t = targetGrid[r][c];

          if (t) {
            if (displayMode === 'color') {
              drawDiamond(centerP.x, centerP.y, rx * 0.95, ry * 0.95);
              ctx.fillStyle = `${t}55`;
              ctx.fill();
            } else {
              drawDiamond(centerP.x, centerP.y, rx * 0.95, ry * 0.95);
              ctx.fillStyle = 'rgba(255,255,255,0.78)';
              ctx.fill();
              ctx.fillStyle = '#5f4f47';
              ctx.font = `${Math.max(8, s * 0.42)}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(colorToCode[t] || '--', centerP.x, centerP.y + 1);
            }
          }

          drawDiamond(centerP.x, centerP.y, rx, ry);
          ctx.strokeStyle = 'rgba(183,146,104,0.45)';
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.beginPath();
          ctx.fillStyle = '#efc59d';
          ctx.arc(centerP.x, centerP.y, s * 0.12, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawBeadAtCell(c, r, color) {
      const p = project(c + 0.5, r + 0.5);
      const s = unit();
      drawDiamond(p.x, p.y - 4, s * 0.85, s * 0.47);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.stroke();

      drawDiamond(p.x, p.y - 1, s * 0.78, s * 0.43);
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.9;
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.beginPath();
      ctx.arc(p.x, p.y - 3, s * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(120,100,90,0.3)';
      ctx.fill();
    }

    function drawBeads() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c]) drawBeadAtCell(c, r, grid[r][c]);
        }
      }
    }

    function drawTweezers() {
      if (!pointer.inside) return;
      const { x, y } = pointer;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(109,149,201,.85)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x - 40, y - 66);
      ctx.lineTo(x - 7, y + 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 26, y - 78);
      ctx.lineTo(x + 7, y - 6);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(180,120,220,.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 46, y - 72);
      ctx.lineTo(x - 12, y - 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 32, y - 84);
      ctx.lineTo(x + 1, y - 10);
      ctx.stroke();

      if (selected) {
        drawDiamond(x + 8, y + 8, 12, 7);
        ctx.fillStyle = selected;
        ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      ctx.fillStyle = '#efe4c6';
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      drawBoardBase();
      drawTargetGrid();
      drawBeads();
      drawTweezers();
    }

    function paintAt(clientX, clientY, erase = false) {
      const cell = toCell(clientX, clientY);
      if (!cell) return;
      if (erase || selected === null) {
        grid[cell.r][cell.c] = null;
      } else if (!grid[cell.r][cell.c]) {
        grid[cell.r][cell.c] = selected;
      }
      draw();
    }

    function loadCatPattern() {
      const pattern = [
        '.................11111',
        '..................1....',
        '......1...........1....',
        '.....11.1..............',
        '....111111111.....1....',
        '....11.1...............',
        '....11..................',
        '....11..1......11....11',
        '....11.....1...11....11',
        '....111..1....111....11',
        '....111...1..1111....11',
        '....1111111111111111111',
        '....1111111111111111111',
        '....1111111111111111111',
        '....2111111111111111111',
        '.....211111111111111111',
        '......21111111111111111',
        '.......2222222222111111'
      ];
      targetGrid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      pattern.forEach((row, r) => {
        [...row].forEach((ch, c) => {
          const rr = r + 7;
          const cc = c + 2;
          if (rr >= ROWS || cc >= COLS) return;
          if (ch === '1') targetGrid[rr][cc] = '#F5F1E9';
          if (ch === '2') targetGrid[rr][cc] = '#D7D7D7';
        });
      });
      draw();
    }

    function mountPalette() {
      tray.innerHTML = '';
      palette.forEach((p) => {
        const btn = document.createElement('button');
        btn.className = 'color-bin';
        btn.title = p.name;
        if (p.value === selected) btn.classList.add('active');
        btn.innerHTML = `<div class="bead-sample" style="--c:${p.value || '#888'}"></div>`;
        btn.onclick = () => { selected = p.value; mountPalette(); draw(); };
        tray.appendChild(btn);
      });
    }

    function resize() {
      const ratio = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      draw();
    }

    document.getElementById('clearBtn').onclick = () => {
      grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      draw();
    };
    document.getElementById('catBtn').onclick = loadCatPattern;
    document.getElementById('rotLBtn').onclick = () => { yawIndex = (yawIndex + 3) % 4; draw(); };
    document.getElementById('rotRBtn').onclick = () => { yawIndex = (yawIndex + 1) % 4; draw(); };
    document.getElementById('modeBtn').onclick = (e) => {
      displayMode = displayMode === 'code' ? 'color' : 'code';
      e.currentTarget.textContent = `模式：${displayMode === 'code' ? '色号' : '目标颜色'}`;
      draw();
    };

    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      paintAt(e.clientX, e.clientY, e.button === 2);
    });
    canvas.addEventListener('pointermove', (e) => {
      const rect = canvas.getBoundingClientRect();
      pointer = { x: e.clientX - rect.left, y: e.clientY - rect.top, inside: true };
      if (dragging) paintAt(e.clientX, e.clientY, e.buttons === 2);
      else draw();
    });
    window.addEventListener('pointerup', () => { dragging = false; });
    canvas.addEventListener('pointerleave', () => { pointer.inside = false; draw(); });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    window.addEventListener('resize', resize);

    mountPalette();
    loadCatPattern();
    resize();
  </script>
</body>
</html>
